        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "404":
          description: User not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - User Management

      summary: Delete User
      description: |
        Delete existing portal user.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 101

      responses:
        "200":
          description: User deleted successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

        "404":
          description: User not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
