openapi: 3.0.3

info:
  title: iSign i3Cubes API
  version: 1.0.0
  description: |
    API documentation for the iSign i3Cubes Attendance Management System.
    Supported Languages:
    - English
    - Sinhala
    - Tamil

servers:
  - url: https://api.isign.i3cubes.com
    description: Production Server

tags:
  - name: Authentication
    description: User authentication APIs
  - name: User Management
    description: Admin portal user management APIs
  - name: Role Management
    description: Role and permission management APIs
  - name: Service Locations
    description: Service location management APIs
  - name: Employee Management
    description: Employee management APIs
  - name: Attendance Management
    description: Attendance management APIs
  - name: Roster Management
    description: Employee roster management APIs
  - name: Device Registration
    description: Mobile device registration APIs
  - name: Attendance Verification
    description: Secure attendance verification session APIs for secret code, selfie, liveness, GPS, and verification completion
  - name: Biometrics
    description: Face enrollment, face verification, liveness detection, and future biometric support APIs
  - name: HR Integration
    description: HR employee and roster synchronization APIs
  - name: Security and Audit
    description: Fraud detection, audit logs, verification audit, and security monitoring APIs
  - name: Reports
    description: Attendance reports, analytics, and payroll export APIs

paths:
  /api/v1/auth/login:
    post:
      tags:
        - Authentication

      summary: User Login
      description: |
        Authenticate portal users using username and password.

        Supported Roles:
        - Administrator
        - EME Area Manager
        - Regional Manager
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin@isign.lk

                password:
                  type: string
                  format: password
                  example: P@ssw0rd123

      responses:
        "200":
          description: Login successful

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Login successful

                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI...

                  user:
                    type: object

                    properties:
                      id:
                        type: integer
                        example: 101

                      user_name:
                        type: string
                        example: John Doe

                      email:
                        type: string
                        example: admin@isign.lk

                      role_id:
                        type: integer
                        example: 1

        "401":
          description: Invalid username or password

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "500":
          description: Internal server error

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me:
    get:
      tags:
        - Authentication

      summary: Get Current Logged User
      description: |
        Returns authenticated user details using JWT token.

      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: User details fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  user:
                    $ref: "#/components/schemas/User"
                  assignedRegion:
                    type: string
                    example: Western Province

                  assignedLocations:
                    type: array

                    items:
                      type: string

                    example:
                      - Colombo Central
                      - Kaduwela
                      - Maharagama
                  permissions:
                    type: array

                    items:
                      type: string

                    example:
                      - VIEW_ATTENDANCE
                      - EDIT_ATTENDANCE
                      - MANAGE_EMPLOYEES
        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
  /api/v1/devices/request-otp:
    post:
      tags:
        - Device Registration

      summary: Request Device Registration SMS OTP

      description: |
        Request SMS OTP for registering a mobile device to a service location.

        This endpoint starts the trusted terminal registration flow:
        1. Mobile app submits service location code and device UUID.
        2. Backend validates the service location code.
        3. Backend sends SMS OTP to the configured service location contact.
        4. Mobile app uses the received OTP in POST /api/v1/devices.

      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - location_code
                - device_uuid

              properties:
                location_code:
                  type: string
                  example: COL-7788

                device_uuid:
                  type: string
                  example: "A1B2-C3D4-E5F6"

      responses:
        "200":
          description: SMS OTP sent successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: SMS OTP sent successfully

                  expires_in:
                    type: integer
                    example: 300

        "400":
          description: Invalid location code or device UUID

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "429":
          description: Too many OTP requests

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/device-auth:
    post:
      tags:
        - Device Registration

      summary: Authenticate Registered Device

      description: |
        Authenticate registered service location device and return device session token.

        Device Authentication Flow:
        1. Device is registered to a service location using SMS verification.
        2. Mobile app securely stores the returned device token.
        3. On every app launch, the app automatically authenticates using the registered device information.
        4. If device authentication succeeds, the app opens directly to the main operational screen.
        5. If device authentication fails or device registration is removed, the app returns to the registration flow.
        6. Mobile users never log in using username/password authentication.

        This endpoint supports the trusted shared terminal architecture used by service locations.
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - device_uuid
                - location_code

              properties:
                device_uuid:
                  type: string
                  example: "A1B2-C3D4-E5F6"

                location_code:
                  type: string
                  example: COL-7788

      responses:
        "200":
          description: Device authenticated successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  device_token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI...

                  location_id:
                    type: integer
                    example: 1

        "401":
          description: Invalid device authentication

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/users:
    get:
      tags:
        - User Management

      summary: Get Users List
      description: |
        Returns paginated list of portal users.

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"

      responses:
        "200":
          description: Users fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  users:
                    type: array

                    items:
                      $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

    post:
      tags:
        - User Management

      summary: Create User
      description: |
        Create new portal user.

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - user_name
                - email
                - password
                - role_id

              properties:
                user_name:
                  type: string
                  example: John Doe

                email:
                  type: string
                  example: john@isign.lk

                password:
                  type: string
                  format: password
                  example: P@ssw0rd123

                role_id:
                  type: integer
                  example: 1

      responses:
        "201":
          description: User created successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
  /api/v1/users/{id}:
    put:
      tags:
        - User Management

      summary: Update User
      description: |
        Update existing portal user.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 101
        - $ref: "#/components/parameters/AcceptLanguageHeader"

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                user_name:
                  type: string
                  example: John Doe

                email:
                  type: string
                  example: john@isign.lk

                role_id:
                  type: integer
                  example: 1

      responses:
        "200":
          description: User updated successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "404":
          description: User not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - User Management

      summary: Delete User
      description: |
        Delete existing portal user.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 101

        - $ref: "#/components/parameters/AcceptLanguageHeader"

      responses:
        "200":
          description: User deleted successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

        "404":
          description: User not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/roles:
    get:
      tags:
        - Role Management

      summary: Get Roles List
      description: |
        Returns available system roles and permissions.

      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Roles fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  roles:
                    type: array

                    items:
                      type: object

                      properties:
                        role_id:
                          type: integer
                          example: 1
                        role_name:
                          type: string
                          example: Administrator

                        permissions:
                          type: array

                          items:
                            type: string

                          example:
                            - VIEW_ATTENDANCE
                            - MANAGE_USERS
                            - MANAGE_EMPLOYEES

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

    post:
      tags:
        - Role Management

      summary: Create Role

      description: |
        Create new system role and assign permissions.

      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - role_name
                - permissions

              properties:
                role_name:
                  type: string
                  example: Regional Manager

                permissions:
                  type: array

                  items:
                    type: string

                  example:
                    - VIEW_ATTENDANCE
                    - MANAGE_EMPLOYEES
                    - MANAGE_ROSTERS

      responses:
        "201":
          description: Role created successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
  /api/v1/roles/{id}:
    put:
      tags:
        - Role Management

      summary: Update Role

      description: |
        Update existing role and permissions.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 1

        - $ref: "#/components/parameters/AcceptLanguageHeader"

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                role_name:
                  type: string
                  example: Regional Manager

                permissions:
                  type: array

                  items:
                    type: string

                  example:
                    - VIEW_ATTENDANCE
                    - EDIT_ATTENDANCE

      responses:
        "200":
          description: Role updated successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

        "404":
          description: Role not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Role Management

      summary: Delete Role

      description: |
        Delete existing system role.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 1

        - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Role deleted successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

        "404":
          description: Role not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/regions:
    get:
      tags:
        - Service Locations

      summary: Get Regions List

      description: |
        Returns available operational regions for dropdown selection.

        UI Usage:
        - Used as the first-level filter before selecting service locations.
        - Frontend should load locations using GET /api/v1/locations?region_id={region_id} after a region is selected.

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"

      responses:
        "200":
          description: Regions fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  regions:
                    type: array

                    items:
                      type: object

                      properties:
                        region_id:
                          type: integer
                          example: 10

                        region_name:
                          type: string
                          example: Western Province

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

  /api/v1/locations:
    get:
      tags:
        - Service Locations

      summary: Get Service Locations

      description: |
        Returns available service locations.

        UI Usage:
        - Used for location dropdown selection.
        - Supports optional filtering by region_id.
        - Frontend should first load regions using GET /api/v1/regions.
      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: region_id

          schema:
            type: integer

          required: false

          example: 10

          description: |
            Optional region filter.
            Used for dependent location dropdown filtering.

        - $ref: "#/components/parameters/AcceptLanguageHeader"

      responses:
        "200":
          description: Locations fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  locations:
                    type: array

                    items:
                      type: object

                      properties:
                        location_id:
                          type: integer
                          example: 1

                        location_name:
                          type: string
                          example: Colombo Central

                        region_id:
                          type: integer
                          example: 10

                        region_name:
                          type: string
                          example: Western Province

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
    post:
      tags:
        - Service Locations

      summary: Create Service Location
      description: |
        Create new service location.

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - location_name
                - region_id

              properties:
                location_name:
                  type: string
                  example: Colombo Central

                region_id:
                  type: integer
                  example: 10

      responses:
        "201":
          description: Location created successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
  /api/v1/locations/{id}:
    put:
      tags:
        - Service Locations

      summary: Update Service Location
      description: |
        Update existing service location.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 1

        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                location_name:
                  type: string
                  example: Colombo Central

                region_id:
                  type: integer
                  example: 10

      responses:
        "200":
          description: Location updated successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

        "404":
          description: Location not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Service Locations

      summary: Delete Service Location
      description: |
        Delete existing service location.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 1

        - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Location deleted successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

        "404":
          description: Location not found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/designations:
    get:
      tags:
        - Employee Management

      summary: Get Designations List

      description: |
        Returns available employee designations for dropdown selection.

        UI Usage:
        - Used in employee create/update forms.
        - Used for employee filtering and reporting.

      security:
        - bearerAuth: []

      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"

      responses:
        "200":
          description: Designations fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  designations:
                    type: array

                    items:
                      type: object

                      properties:
                        designation_id:
                          type: integer
                          example: 5

                        designation_name:
                          type: string
                          example: Paramedic

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

  /api/v1/employees:
    get:
      tags:
        - Employee Management

      summary: Get Employees List
      description: |
        Returns paginated list of employees.

      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: location_id

          schema:
            type: integer

          required: false

          example: 1

          description: |
            Filter employees by assigned service location.

        - in: query
          name: designation_id

          schema:
            type: integer

          required: false

          example: 5

          description: |
            Filter employees by designation.

        - in: query
          name: status_id

          schema:
            type: integer

          required: false

          example: 1

          description: |
            Filter employees by employee status.

        - in: query
          name: search

          schema:
            type: string

          required: false

          example: John

          description: |
            Search employees by employee code or full name.

        - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Employees fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  employees:
                    type: array

                    items:
                      type: object

                      properties:
                        employee_id:
                          type: integer
                          example: 1001

                        employee_code:
                          type: string
                          example: EMP001

                        full_name:
                          type: string
                          example: John Doe

                        designation_id:
                          type: integer
                          example: 5

                        location_id:
                          type: integer
                          example: 1

                        mobile_number:
                          type: string
                          example: "0771234567"

                        status_id:
                          type: integer
                          example: 1
                        secret_code_enabled:
                          type: boolean
                          nullable: true
                          example: true

                        face_enrolled:
                          type: boolean
                          nullable: true
                          example: false

                        biometric_status:
                          type: string
                          nullable: true
                          example: PENDING

                        verification_required:
                          type: boolean
                          nullable: true
                          example: true

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
    post:
      tags:
        - Employee Management

      summary: Create Employee
      description: |
        Create new employee.

      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - employee_code
                - full_name
                - designation_id
                - location_id
                - status_id

              properties:
                employee_code:
                  type: string
                  example: EMP001

                full_name:
                  type: string
                  example: John Doe

                designation_id:
                  type: integer
                  example: 5

                location_id:
                  type: integer
                  example: 1

                mobile_number:
                  type: string
                  example: "0771234567"

                status_id:
                  type: integer
                  example: 1

      responses:
        "201":
          description: Employee created successfully

        "401":
          description: Unauthorized

          content:
            application/json:
