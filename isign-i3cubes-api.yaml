  /api/v1/attendance:
    get:
      tags:
        - Attendance Management

      summary: Get Attendance Records
      description: |
        Returns attendance records.

      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: employee_id

          schema:
            type: integer

          example: 1001

        - in: query
          name: location_id

          schema:
            type: integer

          example: 1

        - in: query
          name: attendance_date

          schema:
            type: string
            format: date

          example: 2025-01-15

      responses:
        "200":
          description: Attendance records fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  attendance:
                    type: array

                    items:
                      type: object

                      properties:
                        attendance_id:
                          type: integer
                          example: 5001

                        employee_id:
                          type: integer
                          example: 1001

                        location_id:
                          type: integer
                          example: 1

                        check_in_time:
                          type: string
                          format: date-time

                          example: "2025-01-15T08:30:00"

                        check_out_time:
                          type: string
                          format: date-time

                          example: "2025-01-15T17:30:00"

                        status_id:
                          type: integer
                          example: 1

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
