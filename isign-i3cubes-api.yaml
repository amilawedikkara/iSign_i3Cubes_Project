      parameters:
        - in: query
          name: location_id

          schema:
            type: integer

          required: false

          example: 1

          description: |
            Filter devices by assigned service location.

        - in: query
          name: status_id

          schema:
            type: integer

          required: false

          example: 1

          description: |
            Filter devices by device status.

        - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Devices fetched successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  devices:
                    type: array

                    items:
                      type: object

                      properties:
                        device_id:
                          type: integer
                          example: 9001

                        location_id:
                          type: integer
                          example: 1001

                        device_uuid:
                          type: string
                          example: "A1B2-C3D4-E5F6"

                        device_model:
                          type: string
                          example: Samsung Galaxy A54

                        platform:
                          type: string
                          example: Android

                        status_id:
                          type: integer
                          example: 1

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
    post:
      tags:
        - Device Registration

      summary: Register Device

      description: |
        Register mobile device for trusted service location attendance usage.

        Device Registration Rules:
        1. One service location can only have one active registered device.
        2. Device registration is verified using service location code and SMS OTP validation.
        3. Mobile users do not use username/password authentication.
        4. If the device is already registered to another service location:
          - the previous location assignment is automatically removed
          - the device is reassigned to the new service location
          - the reassignment event is recorded in the audit trail
        5. If another active device already exists at the target location, registration is denied until the previous device is removed.

        This endpoint supports the trusted shared terminal architecture used by service locations.
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - location_id
                - location_code
                - sms_otp
                - device_uuid
                - device_model
                - platform

              properties:
                location_id:
                  type: integer
                  example: 1001

                device_uuid:
                  type: string
                  example: "A1B2-C3D4-E5F6"

                device_model:
                  type: string
                  example: Samsung Galaxy A54

                platform:
                  type: string
                  example: Android

                status_id:
                  type: integer
                  example: 1
                location_code:
                  type: string
                  example: COL-7788

                sms_otp:
                  type: string
                  example: "884422"

      responses:
        "201":
          description: Device registered successfully

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
