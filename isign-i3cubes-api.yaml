      summary: Create Temporary Employee Assignment

      description: |
        Temporarily assign an employee to another service location.

        Assignment Rules:
        1. Employee remains assigned until assignment_end_time.
        2. Assignment automatically expires after the configured end time.
        3. Original employee location assignment is restored after expiration.
        4. Assignment activity is recorded in the audit trail.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 1001

