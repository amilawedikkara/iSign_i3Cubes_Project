components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object

      properties:
        success:
          type: boolean
          example: false

        message:
          type: string
          example: Error message
    ForbiddenResponse:
      type: object

      properties:
        success:
          type: boolean
          example: false

        message:
          type: string
          example: Access denied
    User:
      type: object

      properties:
        id:
          type: integer
          example: 101

        user_name:
          type: string
          example: John Doe

        email:
          type: string
          example: admin@isign.lk

        role_id:
          type: integer
          example: 1
  parameters:
    AcceptLanguageHeader:
      in: header
      name: Accept-Language
      required: false

      schema:
        type: string
        enum:
          - en
          - si
          - ta

        default: en

      description: |
        Preferred response language.

        Supported values:
        - en = English
        - si = Sinhala
        - ta = Tamil
