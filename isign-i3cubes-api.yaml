            schema:
              type: object

              required:
                - temporary_location_id
                - assignment_start_time
                - assignment_end_time

              properties:
                temporary_location_id:
                  type: integer
                  example: 5

                assignment_start_time:
                  type: string
                  format: date-time
                  example: "2026-05-22T08:00:00Z"

                assignment_end_time:
                  type: string
                  format: date-time
                  example: "2026-05-29T20:00:00Z"

                assignment_reason:
                  type: string
                  example: Temporary staffing shortage coverage

      responses:
        "201":
          description: Temporary assignment created successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  employee_id:
                    type: integer
                    example: 1001

                  temporary_location_id:
                    type: integer
