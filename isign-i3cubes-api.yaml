components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object

      properties:
        success:
          type: boolean
          example: false

        message:
          type: string
          example: Error message
    ForbiddenResponse:
      type: object

      properties:
        success:
          type: boolean
          example: false

        message:
          type: string
          example: Access denied
    User:
      type: object

      properties:
        id:
          type: integer
          example: 101

        fullName:
          type: string
          example: John Doe

        email:
          type: string
          example: admin@isign.lk

        role_id:
          type: integer
          example: 1
