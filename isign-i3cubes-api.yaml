                  type: integer
                  example: 1001

                location_id:
                  type: integer
                  example: 1

                check_in_time:
                  type: string
                  format: date-time

                  example: "2025-01-15T08:30:00"

                check_out_time:
                  type: string
                  format: date-time

                  example: "2025-01-15T17:30:00"

                status_id:
                  type: integer
                  example: 1

      responses:
        "201":
          description: Attendance record created successfully

        "401":
