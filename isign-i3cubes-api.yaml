    post:
      tags:
        - Attendance Management

      summary: Submit Attendance Correction

      description: |
        Submit one-time attendance correction for an employee attendance record.

        Correction Rules:
        1. Only authorized EME or Administrator users can perform corrections.
        2. Attendance records can only be corrected once.
        3. All corrections are permanently recorded in the audit trail.
        4. Original attendance values are preserved for compliance review.

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

          example: 5001

        - $ref: "#/components/parameters/AcceptLanguageHeader"

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - correction_reason

              properties:
                corrected_check_in_time:
                  type: string
                  format: date-time
                  example: "2026-05-22T08:30:00Z"

                corrected_check_out_time:
                  type: string
                  format: date-time
                  example: "2026-05-22T17:30:00Z"

                correction_reason:
                  type: string
                  example: Employee forgot to complete check-out

      responses:
        "200":
          description: Attendance correction completed successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  correction_applied:
                    type: boolean
                    example: true

                  correction_count:
                    type: integer
                    example: 1

        "400":
          description: Attendance record already corrected

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "401":
          description: Unauthorized

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Insufficient permission for attendance correction

          content:
            application/json:
              schema:
